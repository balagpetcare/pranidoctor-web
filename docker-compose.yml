# Local Docker services for Prani Doctor
# Run from this directory:
#   docker compose up -d
#
# PostgreSQL connection:
#   postgresql://postgres:postgres@localhost:5432/pranidoctor_db?schema=public
#
# MinIO Console:
#   http://localhost:9001
#   Username: admin
#   Password: Admin@12345678

services:
  db:
    image: postgres:16-alpine
    container_name: pranidoctor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pranidoctor_db
    ports:
      - "5432:5432"
    volumes:
      - pranidoctor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pranidoctor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: pranidoctor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Admin@12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pranidoctor_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: pranidoctor-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 8;
      mc alias set local http://minio:9000 admin Admin@12345678;
      mc mb -p local/pranidoctor-dev || true;
      exit 0;
      "
    restart: "no"

volumes:
  pranidoctor_pgdata:
  pranidoctor_minio_data: